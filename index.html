<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        
        <div class="scoreboard">
            <div class="score-section">
                <div class="player-label">PLAYER</div>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="divider">vs</div>
            <div class="score-section">
                <div class="player-label">COMPUTER</div>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p><strong>Controls:</strong></p>
            <p>🖱️ Mouse Y-position or ⬆️ ⬇️ Arrow Keys to move paddle</p>
            <p>SPACE to start/pause | R to reset scores</p>
        </div>

        <div class="status-bar">
            <span id="gameStatus">Press SPACE to start</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
